services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polacyszwajcaria
      POSTGRES_USER: psz_user
      POSTGRES_PASSWORD: psz_secret_2026
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psz_user -d polacyszwajcaria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
